<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Consulta de Dados com Filtro</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .filtros { margin-bottom: 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    table { border-collapse: collapse; width: 100%; margin-top: 16px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }
    .erro { color: #b00020; }
    #status { margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Consulta de Chamados (Filtro)</h1>

  <div class="filtros">
    <label>
      Pesquisar:
      <input type="text" id="filtroTexto" placeholder="Digite o texto..." />
    </label>

    <label>
      Em:
      <select id="filtroCampo">
        <option value="nome">Nome</option>
        <option value="email">Email</option>
        <option value="role">Role</option>
      </select>
    </label>

    <button id="btnConsultar">Buscar registros</button>
  </div>

  <p id="status"></p>
  <div id="tabelaContainer"></div>

  <script>
    const statusEl = document.getElementById('status');
    const tabelaContainer = document.getElementById('tabelaContainer');
    const btn = document.getElementById('btnConsultar');
    const textoEl = document.getElementById('filtroTexto');
    const campoEl = document.getElementById('filtroCampo');

    const colunas = {
        id: 'ID',
        nome: 'Nome',
        email: 'Email',
        role: 'Role',
        created_at: 'Criado em',
        updated_at: 'Atualizado em'
    };

    function montarTabela(dados) {
      if (!Array.isArray(dados)) {
        throw new Error('Resposta inesperada: array esperado.');
      }

      if (dados.length === 0) {
        tabelaContainer.innerHTML = '<p>Nenhum registro encontrado.</p>';
        return;
      }

      const chaves = Object.keys(dados[0]);
      let html = '<table><thead><tr>';

      for (const coluna of chaves) {
        html += `<th>${colunas[coluna] || coluna}</th>`;
      }

      html += '</tr></thead><tbody>';

      function formatarData(data) {
      if (!data) return '';
      const dt = new Date(data);
      if (Number.isNaN(dt.getTime())) return data;

      const z = (v) => String(v).padStart(2, '0');
      const dia = z(dt.getDate());
      const mes = z(dt.getMonth() + 1);
      const ano = dt.getFullYear();
      const hora = z(dt.getHours());
      const min = z(dt.getMinutes());
      const seg = z(dt.getSeconds());

      return `${dia}/${mes}/${ano} ${hora}:${min}:${seg}`;
    }

    for (const item of dados) {
        html += '<tr>';
        for (const coluna of chaves) {
          let valor = item[coluna] ?? '';

          if (coluna === 'created_at' || coluna === 'updated_at') {
            valor = formatarData(valor);
          }

          html += `<td>${valor}</td>`;
        }
        html += '</tr>';
      }

      html += '</tbody></table>';
      tabelaContainer.innerHTML = html;
    }

    async function obterDados() {
      try {
        const texto = encodeURIComponent(textoEl.value.trim());
        const campo = encodeURIComponent(campoEl.value);
        let url = '../backend/consulta_bd2.php';

        if (texto !== '') {
          url += `?texto=${texto}&campo=${campo}`;
        }

        const resp = await fetch(url, {
          method: 'GET',
          headers: { 'Accept': 'application/json' },
          cache: 'no-store'
        });

        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status} - ${resp.statusText}`);
        }

        const json = await resp.json();
        return json;
      } catch (err) {
        statusEl.textContent = 'Erro ao carregar: ' + err.message;
        statusEl.className = 'erro';
        return [];
      }
    }

    async function consultar() {
      statusEl.textContent = 'Carregando...';
      statusEl.className = '';
      tabelaContainer.innerHTML = '';

      const dados = await obterDados();

      if (dados.length > 0) {
        statusEl.textContent = `Total de registros: ${dados.length}`;
      } else if (!statusEl.classList.contains('erro')) {
        statusEl.textContent = 'Total de registros: 0';
      }

      montarTabela(dados);
    }

    btn.addEventListener('click', consultar);
  </script>
</body>
</html>
