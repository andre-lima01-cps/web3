<!DOCTYPE html>
<html>
<head>
    <title>Incluir Usuário</title>
</head>
<body>
    <h1>Incluir Novo Usuário</h1>
    <form id="userForm">
        Nome: <input type="text" name="nome" required><br><br>
        Email: <input type="email" name="email" required><br><br>
        Senha Hash: <input type="text" name="senha_hash" required><br><br>
        Role: <select name="role" required>
            <option value="">Selecione um role</option>
            <option value="CLIENTE">CLIENTE</option>
            <option value="ATENDENTE">ATENDENTE</option>
            <option value="ADMINISTRADOR">ADMINISTRADOR</option>
        </select><br><br>
        <button type="submit">Incluir Usuário</button>
    </form>
    <div id="response"></div>

    <script>
        document.getElementById('userForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(this);
            fetch('../backend/incluir.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(data => {
                document.getElementById('response').innerHTML = data;
            })
            .catch(error => {
                document.getElementById('response').innerHTML = 'Erro: ' + error;
            });
        });
    </script>
</body>
</html>
