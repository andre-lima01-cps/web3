<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Consulta de Dados</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 16px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }
    .erro { color: #b00020; }
    #status { margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Consulta de Chamados</h1>

  <button id="btnConsultar">Buscar registros</button>
  <p id="status"></p>

  <div id="tabelaContainer"></div>

  <script>
    const statusEl = document.getElementById('status');
    const tabelaContainer = document.getElementById('tabelaContainer');
    const btn = document.getElementById('btnConsultar');

    function montarTabela(dados) {
      if (!Array.isArray(dados)) {
        throw new Error('Resposta inesperada: array esperado.');
      }

      if (dados.length === 0) {
        tabelaContainer.innerHTML = '<p>Nenhum registro encontrado.</p>';
        return;
      }

      const chaves = Object.keys(dados[0]);
      let html = '<table><thead><tr>';

      for (const coluna of chaves) {
        html += `<th>${coluna}</th>`;
      }

      html += '</tr></thead><tbody>';

      for (const item of dados) {
        html += '<tr>';
        for (const coluna of chaves) {
          html += `<td>${item[coluna] ?? ''}</td>`;
        }
        html += '</tr>';
      }

      html += '</tbody></table>';
      tabelaContainer.innerHTML = html;
    }

    async function obterDados() {
      try {
        const url = '../backend/consulta_bd.php';

        const resp = await fetch(url, {
          method: 'GET',
          headers: { 'Accept': 'application/json' },
          cache: 'no-store'
        });

        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status} - ${resp.statusText}`);
        }

        const json = await resp.json();

        return json;
      } catch (err) {
        statusEl.textContent = 'Erro ao carregar: ' + err.message;
        statusEl.className = 'erro';
        return [];
      }
    }

    async function consultar() {
      statusEl.textContent = 'Carregando...';
      statusEl.className = '';
      tabelaContainer.innerHTML = '';

      const dados = await obterDados();

      if (dados.length) {
        statusEl.textContent = `Total de registros: ${dados.length}`;
      } else if (!statusEl.classList.contains('erro')) {
        statusEl.textContent = 'Nenhum registro retornado.';
      }

      montarTabela(dados);
    }

    btn.addEventListener('click', consultar);
  </script>
</body>
</html>
